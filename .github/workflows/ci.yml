name: CI Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build

  test:
    name: Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: [typecheck]
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm test

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run test:coverage
      - name: Check coverage thresholds
        run: |
          echo "Coverage report generated. Thresholds enforced by vitest.config.ts."
          echo "Lines: 80% | Functions: 80% | Branches: 80% | Statements: 80%"

  quality-gates:
    name: Quality Gates (All Checks)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, build, test, coverage]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs lint.result }}" != "success" ] || \
             [ "${{ needs typecheck.result }}" != "success" ] || \
             [ "${{ needs build.result }}" != "success" ] || \
             [ "${{ needs test.result }}" != "success" ] || \
             [ "${{ needs coverage.result }}" != "success" ]; then
            echo "::error::One or more quality gates failed"
            exit 1
          fi
          echo "All quality gates passed!"
